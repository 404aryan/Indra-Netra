<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indra-Netra — Access Portal</title>
    <meta name="description" content="Access the Indra-Netra crowd safety monitoring system. Authority dashboard, pilgrim view, and live crowd maps.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --surface-0: #0a0e17;
            --surface-1: #111827;
            --surface-2: #1a2233;
            --surface-3: #232d3f;
            --accent: #e8a830;
            --accent-dim: #b8841e;
            --accent-soft: #f6d06b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --text-inverse: #0a0e17;
            --border: rgba(148, 163, 184, 0.12);
            --safe: #34d399;
            --danger: #f87171;
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --radius-full: 999px;
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Outfit", system-ui, sans-serif;
            color: var(--text-primary);
            background:
                radial-gradient(ellipse at 15% 20%, rgba(232, 168, 48, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 80%, rgba(52, 211, 153, 0.05) 0%, transparent 50%),
                var(--surface-0);
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle grain */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px;
        }

        /* Background image layer */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: url("{{ url_for('static', filename='temple.jpg') }}") center/cover no-repeat;
            opacity: 0.07;
            filter: saturate(0.3);
        }

        .container {
            position: relative;
            z-index: 1;
            background:
                radial-gradient(ellipse at top left, rgba(232, 168, 48, 0.05), transparent 50%),
                var(--surface-1);
            padding: 36px 32px 32px;
            border-radius: var(--radius-xl);
            max-width: 460px;
            width: 92%;
            box-shadow:
                0 40px 100px rgba(0, 0, 0, 0.6),
                0 0 60px rgba(232, 168, 48, 0.04);
            border: 1px solid rgba(148, 163, 184, 0.15);
            text-align: left;
            animation: card-in 0.5s var(--ease-out);
        }

        @keyframes card-in {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Decorative glow */
        .container::before {
            content: "";
            position: absolute;
            top: -80px;
            left: -40px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(232, 168, 48, 0.08), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .brand-tag {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 6px;
        }

        h1 {
            font-family: "DM Serif Display", Georgia, serif;
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 4px;
            letter-spacing: -0.01em;
        }

        #welcome-text {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .access-btn {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            padding: 16px;
            margin-bottom: 10px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text-primary);
            cursor: pointer;
            font-family: "Outfit", sans-serif;
            font-size: 13px;
            gap: 14px;
            transition: all 0.2s var(--ease-out);
            text-decoration: none;
        }

        .access-btn:hover {
            border-color: rgba(232, 168, 48, 0.35);
            background: var(--surface-3);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3), 0 0 20px rgba(232, 168, 48, 0.05);
            transform: translateY(-1px);
        }

        .access-btn .icon {
            font-size: 1.4em;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            background: rgba(232, 168, 48, 0.08);
            flex-shrink: 0;
        }

        .title {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
        }

        .subtitle {
            font-size: 11px;
            color: var(--text-muted);
            display: block;
            margin-top: 3px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text-primary);
            font-family: "Outfit", sans-serif;
            font-size: 14px;
            transition: border-color 0.2s ease;
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus {
            outline: none;
            border-color: rgba(232, 168, 48, 0.5);
            box-shadow: 0 0 0 2px rgba(232, 168, 48, 0.1);
        }

        .btn-login {
            padding: 13px;
            width: 100%;
            background: linear-gradient(135deg, var(--accent-dim), var(--accent));
            border: none;
            color: var(--text-inverse);
            font-family: "Outfit", sans-serif;
            font-weight: 600;
            border-radius: var(--radius-full);
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 12px 30px rgba(232, 168, 48, 0.25);
            transition: all 0.2s ease;
            letter-spacing: 0.02em;
        }

        .btn-login:hover {
            box-shadow: 0 16px 40px rgba(232, 168, 48, 0.35);
            transform: translateY(-1px);
        }

        .login-form, .register-form {
            display: none;
            text-align: left;
            margin-top: 16px;
        }

        .login-form h3, .register-form h3, #add-camera-form h3 {
            font-family: "DM Serif Display", Georgia, serif;
            font-weight: 400;
            font-size: 20px;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .error-message {
            color: var(--danger);
            margin-top: 8px;
            font-size: 12px;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            background: rgba(248, 113, 113, 0.08);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 16px 0;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            background: none;
            border: none;
            font-family: "Outfit", sans-serif;
            margin-bottom: 12px;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--accent);
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <div class="bg-layer"></div>

    <div class="container" id="login-container">
        <div class="brand-tag">Indra-Netra</div>
        <h1>Crowd Safety System</h1>
        <p id="welcome-text">Choose how you want to access the system</p>

        <!-- STEP 1: Main Role Selection -->
        <div id="role-selection">
            <button class="access-btn" onclick="showAuthorityOptions()" id="authority-btn">
                <span class="icon">🛡️</span>
                <div>
                    <span class="title">Authority Dashboard</span>
                    <span class="subtitle">Monitor live CCTV, risks & routes</span>
                </div>
            </button>

            <a href="{{ url_for('pilgrim_page') }}" class="access-btn" id="pilgrim-btn">
                <span class="icon">🚶</span>
                <div>
                    <span class="title">Enter as Pilgrim</span>
                    <span class="subtitle">View queues, safe routes & live map</span>
                </div>
            </a>

            <a href="{{ url_for('live_map') }}" target="_blank" class="access-btn" id="live-map-btn">
                <span class="icon">🗺️</span>
                <div>
                    <span class="title">Open Live Map</span>
                    <span class="subtitle">Inside-campus GPS & crowd-based paths</span>
                </div>
            </a>
        </div>

        <!-- STEP 2: Authority Options -->
        <div id="authority-options" style="display:none;">
            <button class="back-link" onclick="showRoleSelection()">← Back</button>
            <button class="access-btn" onclick="showLoginForm()" id="existing-authority-btn">
                <span class="icon">🔑</span>
                <div>
                    <span class="title">Existing Authority</span>
                    <span class="subtitle">Login with your credentials</span>
                </div>
            </button>
            <button class="access-btn" onclick="showRegisterForm()" id="new-authority-btn">
                <span class="icon">✨</span>
                <div>
                    <span class="title">New Authority</span>
                    <span class="subtitle">Create a new account</span>
                </div>
            </button>
        </div>

        <!-- STEP 3A: LOGIN Form -->
        <div id="login-form" class="login-form">
            <button class="back-link" onclick="showAuthorityOptions()">← Back</button>
            <h3>Authority Login</h3>
            <form action="{{ url_for('login') }}" method="post">
                <input type="text" name="username" class="form-input" placeholder="Username" required autocomplete="username">
                <input type="password" name="password" class="form-input" placeholder="Password" required autocomplete="current-password">
                <button type="submit" class="btn-login" id="login-submit-btn">Sign In</button>
            </form>
            {% if error %}
            <p class="error-message">{{ error }}</p>
            {% endif %}
        </div>

        <!-- STEP 3B: REGISTER Form -->
        <div id="register-form" class="register-form">
            <button class="back-link" onclick="showAuthorityOptions()">← Back</button>
            <h3>New Authority Registration</h3>
            <form action="/register" method="post">
                <input type="text" name="new_username" class="form-input" placeholder="Choose Username" required autocomplete="username">
                <input type="password" name="new_password" class="form-input" placeholder="Choose Password" required autocomplete="new-password">
                <input type="email" name="email" class="form-input" placeholder="Email Address" required autocomplete="email">
                <button type="submit" class="btn-login" id="register-submit-btn">Create Account</button>
            </form>
        </div>

        <!-- Add Camera (hackathon demo) -->
        <div id="add-camera-form" style="display:none; text-align:left;">
            <h3>Add Camera</h3>
            <form action="/add_camera" method="post">
                <input type="text" name="camera_name" class="form-input"
                       placeholder="Camera Name (e.g., Gate 1)" required>
                <input type="text" name="rtsp_url" class="form-input"
                       placeholder="RTSP URL (rtsp://...)" required>
                <input type="text" name="cam_username" class="form-input"
                       placeholder="Camera Username (optional)">
                <input type="password" name="cam_password" class="form-input"
                       placeholder="Camera Password (optional)">
                <select name="zone_type" class="form-input" required>
                    <option value="" disabled selected>Select Zone Type</option>
                    <option value="darshan">Darshan Hall</option>
                    <option value="queue">Queue Line</option>
                    <option value="gate">Gate / Exit</option>
                    <option value="outer">Outer Area</option>
                </select>
                <button type="submit" class="btn-login">Save Camera</button>
            </form>
        </div>
    </div>

<script>
    function showRoleSelection() {
        document.getElementById("authority-options").style.display = "none";
        document.getElementById("login-form").style.display = "none";
        document.getElementById("register-form").style.display = "none";
        document.getElementById("role-selection").style.display = "block";
        document.getElementById("welcome-text").innerText = "Choose how you want to access the system";
    }

    function showAuthorityOptions() {
        document.getElementById("role-selection").style.display = "none";
        document.getElementById("login-form").style.display = "none";
        document.getElementById("register-form").style.display = "none";
        document.getElementById("authority-options").style.display = "block";
        document.getElementById("welcome-text").innerText = "Authority Portal";
    }

    function showLoginForm() {
        document.getElementById("authority-options").style.display = "none";
        document.getElementById("login-form").style.display = "block";
        document.getElementById("welcome-text").innerText = "Authority Login";
    }

    function showRegisterForm() {
        document.getElementById("authority-options").style.display = "none";
        document.getElementById("register-form").style.display = "block";
        document.getElementById("welcome-text").innerText = "Register New Authority";
    }

    function showAddCameraForm() {
        document.getElementById("register-form").style.display = "none";
        document.getElementById("add-camera-form").style.display = "block";
        document.getElementById("welcome-text").innerText = "Add Camera to Start";
    }

    {% if show_add_camera %}
        showAddCameraForm();
    {% endif %}
</script>

</body>
</html>
